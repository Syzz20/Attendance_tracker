<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Club Attendance Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #161a23;
    --border: #252b38;
    --accent: #5fffb0;
    --text: #e8eaf0;
    --muted: #5a6275;
    --present: #5fffb0;
    --absent: #ff6b6b;
    --late: #ffd166;
    --excused: #74b9ff;
  }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(95,255,176,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(95,255,176,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 40px 24px; }

  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 48px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .logo-block h1 { font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 800; letter-spacing: -2px; line-height: 1; }
  .logo-block h1 span { color: var(--accent); }
  .logo-block p { font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--muted); margin-top: 6px; letter-spacing: 1px; text-transform: uppercase; }

  .save-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 8px 16px;
    transition: all 0.3s;
  }

  .save-indicator .pulse {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

  .header-stats { display: flex; gap: 12px; flex-wrap: wrap; }

  .stat-pill {
    background: var(--surface); border: 1px solid var(--border); border-radius: 100px;
    padding: 8px 18px; font-family: 'DM Mono', monospace; font-size: 0.78rem;
    display: flex; align-items: center; gap: 8px;
  }
  .stat-pill .dot { width: 8px; height: 8px; border-radius: 50%; }

  input[type="text"], input[type="date"] {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-family: 'Syne', sans-serif; font-size: 0.9rem;
    padding: 12px 16px; outline: none; transition: border-color 0.2s; width: 100%;
  }
  input[type="text"]:focus, input[type="date"]:focus { border-color: var(--accent); }

  .btn {
    padding: 12px 22px; border: none; border-radius: 10px;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem;
    cursor: pointer; transition: all 0.18s; white-space: nowrap;
  }
  .btn-primary { background: var(--accent); color: #0d0f14; }
  .btn-primary:hover { background: #7fffbf; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(95,255,176,0.25); }
  .btn-ghost { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

  .controls { display: flex; gap: 12px; margin-bottom: 32px; flex-wrap: wrap; }
  .controls input { flex: 1; min-width: 200px; }

  .date-bar {
    display: flex; align-items: center; gap: 12px; margin-bottom: 28px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 20px; flex-wrap: wrap;
  }
  .date-bar label { font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .date-bar input { background: transparent; border: 1px solid var(--border); width: auto; }
  .date-nav { display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; }

  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; margin-bottom: 32px; }

  .table-header {
    display: grid; grid-template-columns: auto 1fr repeat(4, auto) auto;
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px; gap: 12px; align-items: center;
  }

  .person-row {
    display: grid; grid-template-columns: auto 1fr repeat(4, auto) auto;
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    gap: 12px; align-items: center; transition: background 0.15s;
  }
  .person-row:last-child { border-bottom: none; }
  .person-row:hover { background: rgba(255,255,255,0.02); }

  .row-num { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--muted); min-width: 24px; text-align: center; }
  .person-name { font-weight: 600; font-size: 0.95rem; }

  .status-btn {
    width: 38px; height: 38px; border-radius: 8px; border: 1.5px solid var(--border);
    background: transparent; cursor: pointer; font-size: 1rem; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .status-btn:hover { transform: scale(1.1); }
  .status-btn.active-present { background: rgba(95,255,176,0.15); border-color: var(--present); box-shadow: 0 0 10px rgba(95,255,176,0.2); }
  .status-btn.active-absent  { background: rgba(255,107,107,0.15); border-color: var(--absent);  box-shadow: 0 0 10px rgba(255,107,107,0.2); }
  .status-btn.active-late    { background: rgba(255,209,102,0.15); border-color: var(--late);    box-shadow: 0 0 10px rgba(255,209,102,0.2); }
  .status-btn.active-excused { background: rgba(116,185,255,0.15); border-color: var(--excused); box-shadow: 0 0 10px rgba(116,185,255,0.2); }

  .btn-remove {
    width: 30px; height: 30px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; cursor: pointer; color: var(--muted); font-size: 1rem;
    transition: all 0.15s; display: flex; align-items: center; justify-content: center;
  }
  .btn-remove:hover { background: rgba(255,107,107,0.15); border-color: var(--absent); color: var(--absent); }

  .empty-state { padding: 60px 20px; text-align: center; color: var(--muted); }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
  .empty-state p { font-family: 'DM Mono', monospace; font-size: 0.85rem; }

  .tabs {
    display: flex; gap: 4px; margin-bottom: 28px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 5px; width: fit-content;
  }
  .tab {
    padding: 8px 20px; border-radius: 8px; font-family: 'Syne', sans-serif;
    font-weight: 600; font-size: 0.85rem; cursor: pointer; border: none;
    background: transparent; color: var(--muted); transition: all 0.15s;
  }
  .tab.active { background: var(--accent); color: #0d0f14; }

  .section-title {
    font-size: 1.1rem; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .history-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; margin-bottom: 40px; }

  .history-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 18px; transition: border-color 0.2s; cursor: pointer;
  }
  .history-card:hover { border-color: var(--accent); }
  .history-card .date-label { font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }

  .history-bars { display: flex; gap: 4px; height: 6px; border-radius: 4px; overflow: hidden; margin-bottom: 12px; }
  .bar-seg { height: 100%; border-radius: 2px; }

  .history-counts { display: flex; gap: 12px; flex-wrap: wrap; }
  .count-item { font-family: 'DM Mono', monospace; font-size: 0.72rem; display: flex; align-items: center; gap: 5px; }
  .count-dot { width: 7px; height: 7px; border-radius: 50%; }

  .legend { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--muted); }
  .legend-box { width: 14px; height: 14px; border-radius: 4px; }

  .view { display: none; }
  .view.active { display: block; }

  .toast {
    position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 10px;
    font-weight: 700; font-size: 0.85rem; transform: translateY(80px); opacity: 0;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 100;
    font-family: 'Syne', sans-serif;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: var(--accent); color: #0d0f14; }
  .toast.error   { background: var(--absent); color: #fff; }

  /* Admin lock styles */
  .admin-only { display: none; }
  .app.admin-unlocked .admin-only { display: flex; }

  .lock-btn {
    padding: 8px 16px; border-radius: 100px; font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 0.78rem; cursor: pointer; border: 1px solid var(--border);
    background: var(--surface); color: var(--muted); transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .lock-btn:hover { border-color: var(--accent); color: var(--accent); }
  .lock-btn.unlocked { border-color: var(--accent); color: var(--accent); background: rgba(95,255,176,0.08); }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 300; backdrop-filter: blur(4px);
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-backdrop.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 32px; width: 100%; max-width: 380px;
    font-family: 'Syne', sans-serif;
  }
  .modal h2 { font-size: 1.4rem; font-weight: 800; margin-bottom: 6px; }
  .modal p { font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--muted); margin-bottom: 24px; }
  .modal input { margin-bottom: 12px; letter-spacing: 3px; }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btns .btn { flex: 1; }


  /* Loading overlay */
  .loading {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; flex-direction: column; gap: 16px;
    font-family: 'DM Mono', monospace; font-size: 0.9rem; color: var(--muted);
  }
  .loading .spinner {
    width: 36px; height: 36px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .export-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .export-bar span { font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--muted); }
</style>
</head>
<body>

<div class="loading" id="loadingScreen">
  <div class="spinner"></div>
  <span>Loading attendance data…</span>
</div>

<div class="app">
  <header>
    <div class="logo-block">
      <h1>Club<span>.</span>Attend</h1>
      <p id="totalSummary">Loading…</p>
    </div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center">
      <div class="save-indicator">
        <button class="lock-btn" id="lockBtn" onclick="toggleAdminModal()">
          🔒 Admin Login
        </button>
        <div class="pulse"></div>
        <span>Auto-saved to disk</span>
      </div>
      <div class="header-stats" id="headerStats"></div>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('today', this)">Today</button>
    <button class="tab" onclick="switchTab('history', this)">History</button>
  </div>

  <!-- TODAY VIEW -->
  <div class="view active" id="view-today">
    <div class="controls admin-only">
      <input type="text" id="nameInput" placeholder="Add member name… (press Enter)" onkeydown="if(event.key==='Enter') addPerson()">
      <button class="btn btn-primary" onclick="addPerson()">+ Add Member</button>
      <button class="btn btn-ghost" onclick="markAll('present')">✓ All Present</button>
    </div>

    <div class="date-bar">
      <label>Date</label>
      <input type="date" id="dateSelect" onchange="renderTable()">
      <div class="date-nav">
        <button class="btn btn-ghost" onclick="changeDate(-1)">← Prev</button>
        <button class="btn btn-ghost" onclick="changeDate(1)">Next →</button>
        <button class="btn btn-primary" onclick="goToday()">Today</button>
      </div>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-box" style="background:var(--present)"></div>Present</div>
      <div class="legend-item"><div class="legend-box" style="background:var(--absent)"></div>Absent</div>
      <div class="legend-item"><div class="legend-box" style="background:var(--late)"></div>Late</div>
      <div class="legend-item"><div class="legend-box" style="background:var(--excused)"></div>Excused</div>
    </div>

    <div class="table-wrap">
      <div class="table-header">
        <span>#</span>
        <span>Member</span>
        <span>Present</span>
        <span>Absent</span>
        <span>Late</span>
        <span>Excused</span>
        <span></span>
      </div>
      <div id="attendanceTable"></div>
    </div>
  </div>

  <!-- HISTORY VIEW -->
  <div class="view" id="view-history">
    <div class="export-bar">
      <span>Export data:</span>
      <button class="btn btn-ghost" onclick="exportCSV()">⬇ CSV</button>
      <button class="btn btn-ghost" onclick="exportJSON()">⬇ JSON</button>
    </div>
    <div class="section-title">All Recorded Sessions</div>
    <div class="history-grid" id="historyGrid"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ─── State (in-memory, sourced from server/data.json) ────────────────────────
  let people  = [];
  let records = {};

  const dateInput = document.getElementById('dateSelect');

  function todayStr() {
    return new Date().toISOString().split('T')[0];
  }

  dateInput.value = todayStr();

  // ─── API helpers ──────────────────────────────────────────────────────────────
  async function api(method, url, data) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (data !== undefined) opts.body = JSON.stringify(data);
    const res = await fetch(url, opts);
    return res.json();
  }

  // ─── Boot: load data from server ─────────────────────────────────────────────
  async function boot() {
    try {
      const data = await api('GET', '/api/data');
      people  = data.people  || [];
      records = data.records || {};
      document.getElementById('loadingScreen').style.display = 'none';
      renderAll();
    } catch (e) {
      document.getElementById('loadingScreen').innerHTML =
        `<div style="color:var(--absent);font-family:'DM Mono',monospace;text-align:center;padding:24px">
          ⚠ Cannot connect to server.<br><br>
          Make sure you ran:<br><code style="color:var(--accent)">node server.js</code><br><br>
          Then refresh this page.
        </div>`;
    }
  }

  boot();

  // ─── Tab switching ────────────────────────────────────────────────────────────
  function switchTab(tab, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + tab).classList.add('active');
    btn.classList.add('active');
    if (tab === 'history') renderHistory();
  }

  // ─── Date navigation ──────────────────────────────────────────────────────────
  function changeDate(delta) {
    const d = new Date(dateInput.value + 'T00:00:00');
    d.setDate(d.getDate() + delta);
    dateInput.value = d.toISOString().split('T')[0];
    renderTable();
  }

  function goToday() {
    dateInput.value = todayStr();
    renderTable();
  }

  // ─── Add person ───────────────────────────────────────────────────────────────
  async function addPerson() {
    const val = document.getElementById('nameInput').value.trim();
    if (!val) return;
    const res = await api('POST', '/api/people', { name: val });
    if (res.error) { toast(res.error, 'error'); return; }
    people = res.people;
    document.getElementById('nameInput').value = '';
    renderAll();
    toast('Added ' + val);
  }

  async function removePerson(name) {
    if (!confirm(`Remove "${name}" from all records?`)) return;
    await api('DELETE', '/api/people', { name });
    people = people.filter(p => p !== name);
    Object.values(records).forEach(day => delete day[name]);
    renderAll();
    toast('Removed ' + name);
  }

  // ─── Set attendance status ────────────────────────────────────────────────────
  async function setStatus(name, status) {
    const date = dateInput.value;
    const cur = (records[date] || {})[name];
    const newStatus = cur === status ? null : status;

    // Optimistic update
    if (!records[date]) records[date] = {};
    if (newStatus === null) delete records[date][name];
    else records[date][name] = newStatus;
    renderTable();

    await api('POST', '/api/attendance', { date, name, status: newStatus });
  }

  async function markAll(status) {
    const date = dateInput.value;
    if (!records[date]) records[date] = {};
    people.forEach(p => { records[date][p] = status; });
    renderTable();
    await api('POST', '/api/attendance/bulk', { date, status });
    toast('Marked all as ' + status);
  }

  // ─── Render ───────────────────────────────────────────────────────────────────
  function renderAll() {
    renderTable();
    renderHeaderStats();
    renderSummary();
  }

  function renderTable() {
    const date   = dateInput.value;
    const dayRec = records[date] || {};
    const container = document.getElementById('attendanceTable');

    if (people.length === 0) {
      container.innerHTML = `<div class="empty-state"><div class="icon">📋</div><p>No members yet. Add someone above to begin tracking.</p></div>`;
      renderHeaderStats(); renderSummary(); return;
    }

    const statuses = ['present','absent','late','excused'];
    const icons    = { present:'✓', absent:'✗', late:'⏱', excused:'○' };

    container.innerHTML = people.map((name, i) => {
      const cur = dayRec[name] || null;
      return `<div class="person-row">
        <span class="row-num">${i+1}</span>
        <span class="person-name">${name}</span>
        ${statuses.map(s => `
          <button class="status-btn ${cur===s?'active-'+s:''}"
            onclick="setStatus('${esc(name)}','${s}')"
            title="${s[0].toUpperCase()+s.slice(1)}">${icons[s]}</button>
        `).join('')}
        <button class="btn-remove admin-only" style="display:none" onclick="removePerson('${esc(name)}')" title="Remove">×</button>
      </div>`;
    }).join('');

    renderHeaderStats();
    renderSummary();
  }

  function renderHeaderStats() {
    const date   = dateInput.value;
    const dayRec = records[date] || {};
    const counts = { present:0, absent:0, late:0, excused:0 };
    people.forEach(p => { if (dayRec[p]) counts[dayRec[p]]++; });
    const colors = { present:'var(--present)', absent:'var(--absent)', late:'var(--late)', excused:'var(--excused)' };
    document.getElementById('headerStats').innerHTML = Object.entries(counts)
      .map(([s,c]) => `<div class="stat-pill"><span class="dot" style="background:${colors[s]}"></span>${c} ${s[0].toUpperCase()+s.slice(1)}</div>`)
      .join('');
  }

  function renderSummary() {
    const days = Object.keys(records).filter(d => Object.keys(records[d]).length > 0).length;
    document.getElementById('totalSummary').textContent =
      `${people.length} member${people.length!==1?'s':''} · ${days} session${days!==1?'s':''} recorded`;
  }

  function renderHistory() {
    const grid  = document.getElementById('historyGrid');
    const dates = Object.keys(records).filter(d => Object.keys(records[d]).length > 0).sort().reverse();

    if (dates.length === 0) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="icon">📅</div><p>No sessions recorded yet.</p></div>`;
      return;
    }

    grid.innerHTML = dates.map(date => {
      const dayRec = records[date];
      const counts = { present:0, absent:0, late:0, excused:0 };
      Object.values(dayRec).forEach(s => { if (s in counts) counts[s]++; });
      const total = Object.values(counts).reduce((a,b) => a+b, 0);

      const bar = (s, c) => total > 0 && counts[s] > 0
        ? `<div class="bar-seg" style="flex:${counts[s]};background:${c}"></div>` : '';

      const fmtDate = new Date(date+'T00:00:00').toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'short',day:'numeric'});
      return `<div class="history-card" onclick="jumpToDate('${date}')">
        <div class="date-label">${fmtDate}</div>
        <div class="history-bars">
          ${bar('present','var(--present)')}${bar('absent','var(--absent)')}${bar('late','var(--late)')}${bar('excused','var(--excused)')}
        </div>
        <div class="history-counts">
          ${[['present','var(--present)'],['absent','var(--absent)'],['late','var(--late)'],['excused','var(--excused)']].map(([s,c]) =>
            counts[s] ? `<div class="count-item"><div class="count-dot" style="background:${c}"></div>${counts[s]} ${s}</div>` : ''
          ).join('')}
        </div>
      </div>`;
    }).join('');
  }

  function jumpToDate(date) {
    dateInput.value = date;
    // switch to today tab
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-today').classList.add('active');
    document.querySelector('.tab').classList.add('active');
    renderTable();
  }

  // ─── Export ───────────────────────────────────────────────────────────────────
  function exportCSV() {
    const dates = Object.keys(records).sort();
    const rows  = [['Member', ...dates]];
    people.forEach(p => rows.push([p, ...dates.map(d => records[d]?.[p] || '')]));
    const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
    download('attendance.csv', csv, 'text/csv');
    toast('CSV exported!');
  }

  function exportJSON() {
    download('attendance.json', JSON.stringify({ people, records }, null, 2), 'application/json');
    toast('JSON exported!');
  }

  function download(filename, content, type) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([content], { type }));
    a.download = filename;
    a.click();
  }

  // ─── Utils ────────────────────────────────────────────────────────────────────
  function esc(s) { return s.replace(/'/g, "\\'"); }

  let toastTimer;
  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
  }

  // ─── Admin auth ───────────────────────────────────────────────────────────────
let isAdmin = false;

function toggleAdminModal() {
  if (isAdmin) { lockAdmin(); return; }
  document.getElementById('adminModal').classList.add('open');
  setTimeout(() => document.getElementById('adminPwInput').focus(), 100);
}

function closeAdminModal() {
  document.getElementById('adminModal').classList.remove('open');
  document.getElementById('adminPwInput').value = '';
}

async function submitAdminLogin() {
  const pw = document.getElementById('adminPwInput').value;
  const res = await api('POST', '/api/auth', { password: pw });
  if (res.ok) {
    isAdmin = true;
    document.getElementById('lockBtn').textContent = '🔓 Admin Mode';
    document.getElementById('lockBtn').classList.add('unlocked');
    document.querySelector('.app').classList.add('admin-unlocked');
    applyAdminUI();
    closeAdminModal();
    toast('Admin mode unlocked');
  } else {
    toast('Wrong password', 'error');
    document.getElementById('adminPwInput').value = '';
  }
}

function lockAdmin() {
  isAdmin = false;
  document.getElementById('lockBtn').textContent = '🔒 Admin Login';
  document.getElementById('lockBtn').classList.remove('unlocked');
  document.querySelector('.app').classList.remove('admin-unlocked');
  applyAdminUI();
  toast('Admin mode locked');
}

function applyAdminUI() {
  // Show/hide all dynamically-rendered admin-only elements (remove buttons)
  document.querySelectorAll('.btn-remove.admin-only').forEach(el => {
    el.style.display = isAdmin ? 'flex' : 'none';
  });
}
</script>
  
<div class="modal-backdrop" id="adminModal">
  <div class="modal">
    <h2>Admin Access</h2>
    <p>Enter the admin password to unlock member management.</p>
    <input type="password" id="adminPwInput" placeholder="Password" 
      onkeydown="if(event.key==='Enter') submitAdminLogin()">
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeAdminModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitAdminLogin()">Unlock</button>
    </div>
  </div>
</div>
</body>
</html>
